name: Publish signing package to GitHub Packages

# Publishes the feat/signing artifact to GitHub Packages so that downstream builds (e.g. Core feat/signing)
# can resolve com.otilm:interfaces as a dependency.
#
# NOTE: this workflow intentionally skips Maven Central – feature-branch
# builds are published to GitHub Packages only.

on:
  push:
    branches:
      - feat/signing
  workflow_dispatch:

concurrency:
  group: publish-signing-package
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Configure GitHub Packages auth
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        run: mvn --batch-mode -Pgithub source:jar javadoc:jar deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
